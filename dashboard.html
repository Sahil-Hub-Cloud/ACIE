<!DOCTYPE html><html><head><title>ACIE — Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #010409; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x:hidden; }
    .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
    .grad-txt { background: linear-gradient(135deg, #fff 40%, #00d1ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .aurora { position: fixed; inset: 0; filter: blur(100px); z-index: -1; opacity: 0.4; background: radial-gradient(circle at 20% 20%, #4338ca22 0, transparent 40%), radial-gradient(circle at 80% 80%, #6d28d922 0, transparent 40%); }
  </style>
</head>
<body class="flex h-screen overflow-hidden">
  <aside class="w-64 bg-black border-r border-white/5 p-8 flex flex-col gap-8">
    <div class="text-2xl font-black">⚡ ACIE</div>
    <nav class="flex flex-col gap-2">
      <a href="/" class="px-4 py-2 text-gray-500 font-bold hover:text-white transition-colors">Home</a>
      <a href="/dashboard.html" class="px-4 py-2 bg-white/5 rounded-lg font-bold border border-white/10">Mission Control</a>
      <a href="/dashboard.html" class="px-4 py-2 text-gray-500 font-bold hover:text-white transition-colors">AI Copilot</a>
    </nav>
    <div class="mt-auto p-4 glass rounded-2xl"><div class="text-[10px] font-bold text-emerald-500 uppercase animate-pulse">● System Live</div></div>
  </aside>
  <main class="flex-1 p-10 overflow-y-auto">
    <h1 class="text-4xl font-black mb-10 tracking-tight">Mission Control</h1>
    <div class="grid grid-cols-4 gap-4 mb-10">
      <div class="glass p-8 rounded-3xl"><div class="text-[10px] font-bold text-gray-500 uppercase mb-2">Security Score</div><div class="text-3xl font-black text-emerald-400">98%</div></div>
      <div class="glass p-8 rounded-3xl"><div class="text-[10px] font-bold text-gray-500 uppercase mb-2">Code Quality</div><div class="text-3xl font-black">96%</div></div>
      <div class="glass p-8 rounded-3xl"><div class="text-[10px] font-bold text-gray-500 uppercase mb-2">Risk Blocked</div><div class="text-3xl font-black text-rose-500">42</div></div>
      <div class="glass p-8 rounded-3xl"><div class="text-[10px] font-bold text-gray-500 uppercase mb-2">Stability</div><div class="text-3xl font-black text-cyan-400">94%</div></div>
    </div>
    <div class="glass p-12 rounded-[40px] min-h-[400px] flex items-center justify-center border-dashed border-white/10">
       <div class="text-center"><div class="text-4xl mb-4">🧠</div><p class="text-gray-500 font-mono text-sm uppercase tracking-widest">Neural Map Loading...</p></div>
    </div>
  </main>
  <script>lucide.createIcons();</script>
</body></html>
